<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#7ec0ee" />
  <title>愛犬が飛ぶ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Mochiy+Pop+P+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ゲーム本体（キャンバス） -->
    <canvas id="game"></canvas>

    <!-- ============ タイトル ============ -->
    <section id="screen-title" class="screen active">
      <div class="title-deco" aria-hidden="true">
        <span class="float f1">🦴</span><span class="float f2">🐾</span>
        <span class="float f3">✨</span><span class="float f4">🐾</span>
        <span class="float f5">🦴</span>
      </div>
      <div class="title-inner">
        <canvas id="title-dog" width="180" height="180" class="title-dog"></canvas>
        <h1 class="logo"><span class="logo-l1">愛犬が</span><span class="logo-l2">飛ぶ</span></h1>
        <p class="lead">あいけんを えらんで、ぶっとばせ！</p>
        <div class="title-btns">
          <button id="btn-photo" class="btn primary">
            <span class="btn-ico">📷</span> 写真でつくる
          </button>
          <button id="btn-select" class="btn secondary">
            <span class="btn-ico">🐶</span> キャラをえらぶ
          </button>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden />
        <p class="best-chip">🏆 ベスト <b id="title-best">0</b> m</p>
      </div>
    </section>

    <!-- ============ キャラ選択 ============ -->
    <section id="screen-select" class="screen">
      <button id="btn-select-back" class="icon-btn back">‹</button>
      <h2 class="screen-h">すきな子をえらぶ</h2>
      <div id="char-grid" class="char-grid"></div>
      <div class="select-bar">
        <button id="btn-select-play" class="btn primary wide" disabled>この子であそぶ ▶</button>
      </div>
    </section>

    <!-- ============ トリミング ============ -->
    <section id="screen-crop" class="screen">
      <button id="btn-crop-back" class="icon-btn back">‹</button>
      <h2 class="screen-h">飛ばす はんいを えらぶ</h2>
      <p class="screen-sub">枠をドラッグして移動 / 角をつまんでサイズ変更</p>
      <div id="crop-stage">
        <canvas id="crop-canvas"></canvas>
        <div id="crop-box">
          <span class="handle tl"></span><span class="handle tr"></span>
          <span class="handle bl"></span><span class="handle br"></span>
        </div>
      </div>
      <div class="select-bar">
        <button id="btn-crop-ok" class="btn primary wide">これで決定 ✓</button>
      </div>
    </section>

    <!-- ============ プレイ中オーバーレイ ============ -->
    <section id="screen-play" class="screen">
      <div class="hud">
        <div class="hud-pill"><span class="hud-label">きょり</span><span id="hud-dist">0</span><span class="hud-unit">m</span></div>
        <div class="hud-pill ghost"><span class="hud-label">BEST</span><span id="hud-best">0</span><span class="hud-unit">m</span></div>
      </div>

      <div id="meters" class="hidden">
        <div class="meter-row">
          <span class="meter-ico">💪</span>
          <div class="bar"><div id="power-fill" class="fill power"></div></div>
        </div>
        <div class="meter-row">
          <span class="meter-ico">📐</span>
          <div class="bar"><div id="angle-fill" class="fill angle"></div></div>
        </div>
      </div>

      <button id="btn-tap" class="tap-area">
        <span id="tap-text" class="tap-text">タップでスタート</span>
      </button>
    </section>

    <!-- ============ リザルト ============ -->
    <section id="screen-result" class="screen">
      <div class="result-card">
        <p class="result-emoji" id="result-emoji">🎉</p>
        <p class="result-cap">きろく</p>
        <p class="result-dist"><span id="result-dist">0</span><small>m</small></p>
        <p id="result-best" class="result-best"></p>
        <button id="btn-retry" class="btn primary wide">もう一回とばす 🔁</button>
        <button id="btn-newphoto" class="btn ghost wide">べつの子にする</button>
      </div>
    </section>
  </div>

  <script src="js/characters.js"></script>
  <script src="js/crop.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
