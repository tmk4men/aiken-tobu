<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#9bd0ff" />
  <title>愛犬ダッシュ</title>
  <meta name="description" content="あなたの愛犬の写真で遊ぶ、タップでジャンプのランゲーム。愛犬がどこまでも走る！" />

  <!-- OGP / Twitter Card -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="愛犬ダッシュ" />
  <meta property="og:title" content="愛犬ダッシュ" />
  <meta property="og:description" content="あなたの愛犬の写真で遊ぶ、タップでジャンプのランゲーム。どこまで走れる？" />
  <meta property="og:url" content="https://tmk4men.github.io/aiken-tobu/" />
  <meta property="og:image" content="https://tmk4men.github.io/aiken-tobu/ogp.png?v=4" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ja_JP" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="愛犬ダッシュ" />
  <meta name="twitter:description" content="あなたの愛犬の写真で遊ぶ、タップでジャンプのランゲーム。" />
  <meta name="twitter:image" content="https://tmk4men.github.io/aiken-tobu/ogp.png?v=4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div id="stage">
  <div id="app">
    <!-- ゲーム本体（キャンバス） -->
    <canvas id="game"></canvas>

    <!-- ============ タイトル ============ -->
    <section id="screen-title" class="screen active">
      <div class="bokeh" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="title-inner">
        <canvas id="title-dog" width="200" height="200" class="title-dog"></canvas>
        <h1 class="logo"><span class="logo-l1">愛犬</span><span class="logo-l2">ダッシュ</span></h1>
        <p class="lead">タップでジャンプ。どこまで走れる？</p>
        <div class="title-btns">
          <button id="btn-photo" class="btn primary"><span class="btn-ico">📷</span>写真でつくる</button>
          <button id="btn-select" class="btn secondary"><span class="btn-ico">🐶</span>キャラをえらぶ</button>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden />
        <p class="best-chip">BEST <b id="title-best">0</b> m</p>
      </div>
    </section>

    <!-- ============ キャラ選択 ============ -->
    <section id="screen-select" class="screen">
      <button id="btn-select-back" class="icon-btn back" aria-label="もどる">‹</button>
      <h2 class="screen-h">すきな子をえらぶ</h2>
      <div id="char-grid" class="char-grid"></div>
      <div class="select-bar">
        <button id="btn-select-play" class="btn primary wide" disabled>この子で走る ▶</button>
      </div>
    </section>

    <!-- ============ トリミング ============ -->
    <section id="screen-crop" class="screen">
      <button id="btn-crop-back" class="icon-btn back" aria-label="もどる">‹</button>
      <h2 class="screen-h">走らせる はんいを えらぶ</h2>
      <p class="screen-sub">枠をドラッグ／角をつまんでサイズ変更</p>
      <div id="crop-stage">
        <canvas id="crop-canvas"></canvas>
        <div id="crop-box">
          <span class="handle tl"></span><span class="handle tr"></span>
          <span class="handle bl"></span><span class="handle br"></span>
        </div>
      </div>
      <div class="select-bar">
        <button id="btn-crop-ok" class="btn primary wide">これで決定 ✓</button>
      </div>
    </section>

    <!-- ============ プレイ中 ============ -->
    <section id="screen-play" class="screen">
      <div class="hud">
        <div class="hud-pill"><span id="hud-dist">0</span><span class="hud-unit">m</span></div>
        <div class="hud-pill coin"><span class="coin-ico">🦴</span><span id="hud-coins">0</span></div>
      </div>
      <button id="btn-tap" class="tap-area">
        <span id="tap-text" class="tap-text">タップでスタート</span>
      </button>
    </section>

    <!-- ============ リザルト ============ -->
    <section id="screen-result" class="screen">
      <div class="result-card">
        <p class="result-cap" id="result-cap">きろく</p>
        <p class="result-dist"><span id="result-dist">0</span><small>m</small></p>
        <div class="result-stats">
          <span id="result-coins">🦴 0</span>
          <span class="dot">·</span>
          <span id="result-best">BEST 0 m</span>
        </div>
        <button id="btn-retry" class="btn primary wide">もう一回はしる</button>
        <button id="btn-newphoto" class="btn ghost wide">べつの子にする</button>
      </div>
    </section>
  </div>
  </div>

  <script src="js/characters.js?v=4"></script>
  <script src="js/crop.js?v=4"></script>
  <script src="js/game.js?v=4"></script>
  <script src="js/main.js?v=4"></script>
</body>
</html>
